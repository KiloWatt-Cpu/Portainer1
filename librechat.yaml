version: 1.3.9

cache: true

fileStrategy: local

interface:
  customWelcome: 'Welcome to LibreChat.'
  fileSearch: true
  modelSelect: true
  parameters: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  fileCitations: true

registration:
  socialLogins: []

actions:
  allowedDomains:
    - swapi.dev
    - librechat.ai
  allowedAddresses:
    - host.docker.internal
    - 127.0.0.1

mcpSettings:
  allowedAddresses:
    - host.docker.internal
    - 127.0.0.1

endpoints:
  allowedAddresses:
    - host.docker.internal
    - localhost
    - 127.0.0.1
    - ollama
  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      headers:
        x-librechat-body-parentmessageid: '{{LIBRECHAT_BODY_PARENTMESSAGEID}}'
      models:
        default:
          - 'deepseek/deepseek-v4-pro'
        fetch: false
      titleConvo: true
      titleModel: 'deepseek/deepseek-v4-pro'
      dropParams:
        - stop
      modelDisplayLabel: 'OpenRouter'
  openAI:
    titleConvo: true
    titleModel: gpt-5.4-mini
  anthropic:
    titleConvo: true
    titleModel: claude-haiku-4.5
    streamRate: 20
  agents:
    recursionLimit: 25
    maxRecursionLimit: 50
    maxCitations: 30
    maxCitationsPerFile: 7
    minRelevanceScore: 0.45
    capabilities:
      - execute_code
      - file_search
      - actions
      - tools
